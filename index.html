<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Ventas Alcop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
    <link href="assets/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>
<body>
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h6 class="sidebar-title">Menu de Reportes</h6>
            <button class="btn-close-sidebar d-md-none" id="btnCloseSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <ul class="nav-list">
                <li>
                    <a href="#" class="nav-link active" data-view="ventas">
                        <i class="fas fa-shopping-cart me-2"></i>
                        Registro de Ventas
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-view="instalacion">
                        <i class="fas fa-tools me-2"></i>
                        Programacion Instalacion
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-view="mercancia">
                        <i class="fas fa-truck me-2"></i>
                        Reporte de Mercancia
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-view="gastos">
                        <i class="fas fa-money-bill-wave me-2"></i>
                        Reporte de Gastos
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-view="cartera">
                        <i class="fas fa-wallet me-2"></i>
                        Reporte de Cartera
                    </a>
                </li>
            </ul>
        </nav>
    </aside>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <button class="btn-toggle-sidebar d-md-none" id="btnToggleSidebar">
        <i class="fas fa-bars"></i>
    </button>

    <header class="main-header position-relative">
        <div class="container-fluid">
            <div class="d-flex align-items-center justify-content-between py-2">
                <div class="d-flex align-items-center">
                    <img src="assets/img/logo.png" alt="Logo" class="header-logo">
                </div>
                <button class="btn btn-outline-light btn-sm" id="btnCerrarSesion" title="Cerrar Sesion">
                    <i class="fas fa-sign-out-alt me-2"></i>Cerrar Sesion
                </button>
            </div>

            <h5 class="header-title fw-semibold mb-0" id="viewTitle">
                Registro de Ventas
            </h5>
        </div>
    </header>

    <main class="main-content">
        <div class="container-fluid px-4 py-4">
            <div id="viewContainer"></div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container-fluid px-4 py-3">
            <div class="text-center text-muted small">
                <p class="text-white">Alcop &copy; 2026 Ventas Alcop. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="assets/js/scripts.js"></script>
</body>
</html>
