<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Acceso - Sistema de Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <style>
        body {
            background:
                radial-gradient(circle at top left, rgba(255, 255, 255, 0.24), transparent 32%),
                radial-gradient(circle at bottom right, rgba(166, 166, 166, 0.22), transparent 30%),
                linear-gradient(135deg, #0d0d0d 0%, #242424 45%, #525252 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .login-container {
            max-width: 470px;
            width: 100%;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.24);
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.22);
        }
        .login-header {
            background:
                linear-gradient(145deg, rgba(11, 11, 12, 0.94), rgba(42, 42, 42, 0.96)),
                linear-gradient(135deg, #171717 0%, #3a3a3a 100%);
            color: white;
            padding: 34px 30px 30px;
            text-align: center;
        }
        .login-header img {
            max-width: 158px;
            margin-bottom: 18px;
            filter: drop-shadow(0 10px 24px rgba(0, 0, 0, 0.18));
        }
        .brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 12px;
            border-radius: 999px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.16);
            font-size: 0.78rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .login-header h4 {
            letter-spacing: 0.01em;
        }
        .login-body {
            padding: 40px;
        }
        .form-control {
            border-radius: 12px;
            border: 2px solid #d6d6d6;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #5e5e5e;
            box-shadow: 0 0 0 0.2rem rgba(94, 94, 94, 0.16);
        }
        .btn-login {
            background: linear-gradient(135deg, #171717 0%, #4a4a4a 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.2);
        }
        .input-group-text {
            background-color: #f4f4f4;
            border: 2px solid #d6d6d6;
            border-right: none;
            border-radius: 12px 0 0 12px;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 12px 12px 0;
        }
        .alert-danger {
            border-radius: 12px;
            border: none;
        }
        @media (max-width: 576px) {
            .login-body {
                padding: 28px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/img/logo.png" alt="Logo" class="img-fluid">
                <h4 class="mb-0 fw-bold">Bienvenido</h4>
                <p class="mb-0 mt-2 opacity-75">Accede al sistema de reportes y seguimiento</p>
            </div>
            <div class="login-body">
                <form id="loginForm">
                    <div id="loginError" class="alert alert-danger d-none" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span id="errorMessage"></span>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">
                            <i class="fas fa-envelope me-2 text-muted"></i>Correo Electrónico
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="Ingrese su correo electrónico" required autocomplete="email">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">
                            <i class="fas fa-lock me-2 text-muted"></i>Contraseña
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-key"></i>
                            </span>
                            <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required autocomplete="current-password">
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                            <i class="fas fa-sign-in-alt me-2"></i>
                            Iniciar Sesión
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const form = document.getElementById("loginForm");
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const loginError = document.getElementById("loginError");
            const errorMessage = document.getElementById("errorMessage");
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnHtml = submitBtn.innerHTML;
            const usuariosPermitidos = {
                "admin@gmail.com": "admin",
                "alfombrando@gmail.com": "empleado",
            };

            const obtenerRol = (email) => usuariosPermitidos[String(email || "").trim().toLowerCase()] || "";
            const guardarUsuarioLocal = (email, rol) => {
                localStorage.setItem("usuario", JSON.stringify({
                    email: String(email || "").trim().toLowerCase(),
                    rol
                }));
            };

            const showError = (message) => {
                errorMessage.textContent = message;
                loginError.classList.remove("d-none");
            };

            const hideError = () => {
                loginError.classList.add("d-none");
                errorMessage.textContent = "";
            };

            const setLoading = (loading) => {
                submitBtn.disabled = loading;
                submitBtn.innerHTML = loading
                    ? '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Ingresando...'
                    : originalBtnHtml;
            };

            try {
                const usuarioLocal = JSON.parse(localStorage.getItem("usuario") || "{}");
                const emailLocal = String(usuarioLocal.email || "").trim().toLowerCase();
                const rolLocal = String(usuarioLocal.rol || "").trim().toLowerCase();
                if (emailLocal && (rolLocal === "admin" || rolLocal === "empleado")) {
                    window.location.replace("index.html");
                    return;
                }
            } catch (_) {}

            try {
                const user = await window.getCurrentUser();
                if (user) {
                    const rol = obtenerRol(user.email);
                    if (!rol) {
                        await supabaseClient.auth.signOut();
                        showError("Este usuario no tiene acceso al sistema.");
                        return;
                    }
                    guardarUsuarioLocal(user.email, rol);
                    window.location.replace("index.html");
                    return;
                }
            } catch (err) {
                console.error(err);
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                hideError();
                setLoading(true);

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const rol = obtenerRol(email);

                if (!rol) {
                    showError("Este usuario no esta autorizado para ingresar.");
                    setLoading(false);
                    return;
                }

                try {
                    try {
                        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) console.warn("Inicio de sesion Supabase omitido (modo localStorage):", error.message);
                    } catch (err) {
                        console.warn("Fallo de Supabase omitido (modo localStorage):", err);
                    }
                    guardarUsuarioLocal(email, rol);
                    window.location.replace("index.html");
                } catch (err) {
                    console.error(err);
                    showError("No se pudo iniciar sesion. Revisa tus datos e intenta de nuevo.");
                } finally {
                    setLoading(false);
                }
            });
        });
    </script>
</body>
</html>
