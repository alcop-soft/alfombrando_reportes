<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <meta name="author" content="" />
    <title>Iniciar Sesion - Alfombrando Reportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="assets/css/styles.css" rel="stylesheet" />
    <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: linear-gradient(135deg, #777777 0%, #343236 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #b7b9c1 0%, #5a555f 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-header img {
            max-width: 150px;
            margin-bottom: 15px;
        }
        .login-body {
            padding: 40px;
        }
        .form-control {
            border-radius: 8px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #606267;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-login {
            background: linear-gradient(135deg, #ffffff 0%, #797979 100%);
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            transition: transform 0.2s ease;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-right: none;
            border-radius: 8px 0 0 8px;
        }
        .input-group .form-control {
            border-left: none;
            border-radius: 0 8px 8px 0;
        }
        .alert-danger {
            border-radius: 8px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="assets/img/logo.png" alt="Logo Alfombrando" class="img-fluid">
                <h4 class="mb-0 fw-bold">Bienvenido</h4>
                <p class="mb-0 mt-2 opacity-75">Inicia sesion para continuar</p>
            </div>
            <div class="login-body">
                <form id="loginForm">
                    <div id="loginError" class="alert alert-danger d-none" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i>
                        <span id="errorMessage"></span>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">
                            <i class="fas fa-envelope me-2 text-muted"></i>Correo Electrónico
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-user"></i>
                            </span>
                            <input type="email" class="form-control" id="email" placeholder="Ingrese su correo electrónico" required autocomplete="email">
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">
                            <i class="fas fa-lock me-2 text-muted"></i>Contraseña
                        </label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="fas fa-key"></i>
                            </span>
                            <input type="password" class="form-control" id="password" placeholder="Ingrese su contraseña" required autocomplete="current-password">
                        </div>
                    </div>
                    
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-login btn-primary w-100 text-white">
                            <i class="fas fa-sign-in-alt me-2"></i>
                            Iniciar Sesión
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const form = document.getElementById("loginForm");
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const loginError = document.getElementById("loginError");
            const errorMessage = document.getElementById("errorMessage");
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalBtnHtml = submitBtn.innerHTML;
            const usuariosPermitidos = {
                "admin@gmail.com": "admin",
                "alfombrando@gmail.com": "empleado"
            };

            const obtenerRol = (email) => usuariosPermitidos[String(email || "").trim().toLowerCase()] || "";
            const guardarUsuarioLocal = (email, rol) => {
                localStorage.setItem("usuario", JSON.stringify({
                    email: String(email || "").trim().toLowerCase(),
                    rol
                }));
            };

            const showError = (message) => {
                errorMessage.textContent = message;
                loginError.classList.remove("d-none");
            };

            const hideError = () => {
                loginError.classList.add("d-none");
                errorMessage.textContent = "";
            };

            const setLoading = (loading) => {
                submitBtn.disabled = loading;
                submitBtn.innerHTML = loading
                    ? '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Ingresando...'
                    : originalBtnHtml;
            };

            try {
                const usuarioLocal = JSON.parse(localStorage.getItem("usuario") || "{}");
                const emailLocal = String(usuarioLocal.email || "").trim().toLowerCase();
                const rolLocal = String(usuarioLocal.rol || "").trim().toLowerCase();
                if (emailLocal && (rolLocal === "admin" || rolLocal === "empleado")) {
                    window.location.replace("index.html");
                    return;
                }
            } catch (_) {}

            try {
                const user = await window.getCurrentUser();
                if (user) {
                    const rol = obtenerRol(user.email);
                    if (!rol) {
                        await supabaseClient.auth.signOut();
                        showError("Este usuario no tiene acceso al sistema.");
                        return;
                    }
                    guardarUsuarioLocal(user.email, rol);
                    window.location.replace("index.html");
                    return;
                }
            } catch (err) {
                console.error(err);
            }

            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                hideError();
                setLoading(true);

                const email = emailInput.value.trim();
                const password = passwordInput.value;
                const rol = obtenerRol(email);

                if (!rol) {
                    showError("Este usuario no esta autorizado para ingresar.");
                    setLoading(false);
                    return;
                }

                try {
                    try {
                        const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
                        if (error) console.warn("Inicio de sesion Supabase omitido (modo localStorage):", error.message);
                    } catch (err) {
                        console.warn("Fallo de Supabase omitido (modo localStorage):", err);
                    }
                    guardarUsuarioLocal(email, rol);
                    window.location.replace("index.html");
                } catch (err) {
                    console.error(err);
                    showError("No se pudo iniciar sesion. Revisa tus datos e intenta de nuevo.");
                } finally {
                    setLoading(false);
                }
            });
        });
    </script>
</body>
</html>
