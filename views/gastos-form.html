<!-- Vista: Registro de Gastos -->
<div class="view-container">
    <div class="form-view-shell">
    <!-- Formulario -->
    <div class="card shadow-sm border-0">
        <div class="card-header bg-gradient-primary text-white">
            <h6 class="mb-0 fw-semibold">
                <i class="fas fa-plus-circle me-2"></i>
                Reporte de Gastos y Movimientos
            </h6>
        </div>
        <div class="card-body">
            <form id="dataForm" class="row gy-3 gx-4">
                <div class="col-md-6">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="tipo" class="form-label fw-semibold">
                                <i class="fas fa-tags me-2 text-primary"></i>Tipo de Movimiento
                            </label>
                            <select class="form-select form-select-lg" id="tipo">
                                <option value="">Seleccione tipo de movimiento</option>
                                <option value="1">Impuestos</option>
                                <option value="2">Vehiculos</option>
                                <option value="3">Pago Proveedores</option>
                                <option value="4">Gastos Personales</option>
                                <option value="5">Fletes</option>
                                <option value="6">Servicios publicos</option>
                                <option value="7">Otros</option>
                                <option value="8">Nomina</option>
                            </select>
                        </div>
                        <div class="col-12 d-none" id="tipoOtroWrap">
                            <label for="tipoOtro" class="form-label fw-semibold">
                                <i class="fas fa-pen me-2 text-primary"></i>Especifica el tipo
                            </label>
                            <input type="text" class="form-control form-control-lg" id="tipoOtro" placeholder="Escribe el tipo de movimiento">
                        </div>
                        <div class="col-12">
                            <label for="monto" class="form-label fw-semibold">
                                <i class="fas fa-dollar-sign me-2 text-primary"></i>Monto del Movimiento
                            </label>
                            <div class="input-group input-group-lg">
                                <span class="input-group-text bg-light">$</span>
                                <input type="number" step="0.01" required class="form-control form-control-lg" id="monto" placeholder="0.00">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="fechaHora" class="form-label fw-semibold">
                                <i class="fas fa-calendar-alt me-2 text-primary"></i>Fecha y Hora del Movimiento
                            </label>
                            <input type="datetime-local" required class="form-control form-control-lg" id="fechaHora">
                        </div>
                        <div class="col-12">
                            <label for="descripcion" class="form-label fw-semibold">
                                <i class="fas fa-sticky-note me-2 text-primary"></i>Descripción del Movimiento
                            </label>
                            <input type="text" class="form-control form-control-lg" id="descripcion" placeholder="Ingrese una descripción detallada del movimiento">
                        </div>
                    </div>
                </div>
                <div class="col-12">
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <button type="reset" class="btn btn-outline-secondary btn-lg px-4 me-md-2">
                            <i class="fas fa-eraser me-2"></i>Limpiar Formulario
                        </button>
                        <button type="button" class="btn btn-outline-dark btn-lg px-4 btn-cancel-form" data-target-view="gastos-historial"><i class="fas fa-arrow-left me-2"></i>Cancelar</button>
                        <button type="submit" class="btn btn-primary btn-lg px-4">
                            <i class="fas fa-save me-2"></i>Registrar Movimiento
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-lg-3">
            <div class="card bg-danger text-white border-0 shadow-sm h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1">Gastos de Hoy</h6>
                        <h3 class="mb-0" id="gastosKpiHoy" data-counter-type="money">$0</h3>
                    </div>
                    <i class="fas fa-calendar-day fs-2 opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-lg-3">
            <div class="card bg-primary text-white border-0 shadow-sm h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1">Movimientos Hoy</h6>
                        <h3 class="mb-0" id="gastosKpiMovHoy" data-counter-type="number">0</h3>
                    </div>
                    <i class="fas fa-exchange-alt fs-2 opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-lg-3">
            <div class="card bg-warning text-white border-0 shadow-sm h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1">Gastos Ultimos 7 Dias</h6>
                        <h3 class="mb-0" id="gastosKpiSemana" data-counter-type="money">$0</h3>
                    </div>
                    <i class="fas fa-history fs-2 opacity-50"></i>
                </div>
            </div>
        </div>
        <div class="col-lg-3">
            <div class="card bg-success text-white border-0 shadow-sm h-100">
                <div class="card-body d-flex justify-content-between align-items-center">
                    <div>
                        <h6 class="mb-1">Promedio Diario (7d)</h6>
                        <h3 class="mb-0" id="gastosKpiPromDia" data-counter-type="money">$0</h3>
                    </div>
                    <i class="fas fa-chart-line fs-2 opacity-50"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Buscador General -->
    <div class="card-body pt-3 pb-0 px-0">
        <div class="d-flex justify-content-between align-items-center mb-3 toolbar-responsive gap-2 flex-wrap">
            <div class="input-group" style="max-width: 400px;">
                <span class="input-group-text bg-white border-end-0">
                    <i class="fas fa-search text-muted"></i>
                </span>
                <input type="text" id="buscadorGastos" class="form-control border-start-0" placeholder="Buscar en movimientos..." aria-label="Buscar">
            </div>
            <div class="btn-group" role="group">
                <button id="btnGastos" class="btn btn-outline-primary active" type="button">
                    <i class="fas fa-list me-2"></i>Todos los Movimientos
                </button>
                <button id="btnGastosDia" class="btn btn-outline-primary" type="button">
                    <i class="fas fa-calendar-day me-2"></i>Movimientos de Hoy
                </button>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="card shadow-sm mb-4 border-0">
        <div class="card-header bg-gradient-primary text-white">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center gap-3">
                    <h6 class="mb-0 fw-semibold">
                        <i class="fas fa-table me-2"></i>Registro de Movimientos
                    </h6>
                    <span class="badge bg-white text-primary fs-6 px-3 py-2" id="gastosTotal">0</span>
                </div>
                <div class="text-end">
                    <small class="text-white opacity-75">Total de registros</small>
                </div>
            </div>
        </div>
        <div class="card-body p-0">
            <div id="tablaGastos" class="table-responsive">
                <table id="datatablesSimple" class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="fw-semibold"><i class="fas fa-tags me-2"></i>Tipo de Movimiento</th>
                            <th class="fw-semibold"><i class="fas fa-dollar-sign me-2"></i>Monto</th>
                            <th class="fw-semibold"><i class="fas fa-calendar-alt me-2"></i>Fecha y Hora</th>
                            <th class="fw-semibold"><i class="fas fa-sticky-note me-2"></i>Descripción</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Los datos se agregarán aquí -->
                    </tbody>
                </table>
            </div>
            <div id="gastosDia" class="table-responsive" style="display:none;">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="fw-semibold"><i class="fas fa-tags me-2"></i>Tipo de Movimiento</th>
                            <th class="fw-semibold"><i class="fas fa-dollar-sign me-2"></i>Monto</th>
                            <th class="fw-semibold"><i class="fas fa-calendar-alt me-2"></i>Fecha y Hora</th>
                            <th class="fw-semibold"><i class="fas fa-sticky-note me-2"></i>Descripción</th>
                        </tr>
                    </thead>
                    <tbody id="gastosDiaBody">
                        <!-- Los datos se agregarán aquí -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>


</div>
