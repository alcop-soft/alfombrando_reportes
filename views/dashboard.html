<div class="view-container dashboard-enterprise">
    <div class="row g-3 mb-4">
        <div class="col-xl-3 col-md-6">
            <div class="card bg-gradient-primary text-white border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="mb-1 opacity-75">Ingresos Totales</p>
                            <h4 class="mb-0" id="dashIngresos">$0</h4>
                        </div>
                        <i class="fas fa-sack-dollar fs-3 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card bg-gradient-success text-white border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="mb-1 opacity-75">Ventas Registradas</p>
                            <h4 class="mb-0" id="dashVentas">0</h4>
                        </div>
                        <i class="fas fa-receipt fs-3 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card bg-gradient-warning text-white border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="mb-1 opacity-75">Deuda en Cartera</p>
                            <h4 class="mb-0" id="dashCartera">$0</h4>
                        </div>
                        <i class="fas fa-wallet fs-3 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-3 col-md-6">
            <div class="card bg-gradient-info text-white border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <p class="mb-1 opacity-75">Ticket Promedio</p>
                            <h4 class="mb-0" id="dashTicketPromedio">$0</h4>
                        </div>
                        <i class="fas fa-chart-simple fs-3 opacity-50"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-light fw-semibold">
                    <i class="fas fa-chart-line me-2 text-primary"></i>Ingresos por Mes
                </div>
                <div class="card-body">
                    <canvas id="chartVentasMes" height="120"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-4">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-light fw-semibold">
                    <i class="fas fa-balance-scale me-2 text-primary"></i>Estado de Cartera
                </div>
                <div class="card-body">
                    <canvas id="chartCarteraEstado" height="120"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-3">
        <div class="col-lg-7">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-light fw-semibold">
                    <i class="fas fa-boxes me-2 text-primary"></i>Top Productos (Cantidad)
                </div>
                <div class="card-body">
                    <canvas id="chartProductosTop" height="120"></canvas>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card shadow-sm border-0 h-100">
                <div class="card-header bg-light fw-semibold">
                    <i class="fas fa-clock-rotate-left me-2 text-primary"></i>Actividad Reciente
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush" id="dashHistorial"></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-header bg-light fw-semibold">
            <i class="fas fa-users me-2 text-primary"></i>Clientes con Mayor Deuda
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Cliente</th>
                            <th>Producto</th>
                            <th>Deuda</th>
                            <th>Fecha</th>
                        </tr>
                    </thead>
                    <tbody id="dashTopClientes"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
